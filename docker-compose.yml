version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: zlai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zlai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zlai123}
      POSTGRES_DB: ${POSTGRES_DB:-zlai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zlai} -d ${POSTGRES_DB:-zlai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: zlai-server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-zlai}:${POSTGRES_PASSWORD:-zlai123}@db:5432/${POSTGRES_DB:-zlai}
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-Yx9kP2mQ3nL5wB7vF8rT1hJ4sD6eR0gH}
      AMAP_KEY: ${AMAP_KEY:-b4a9ed33784ddcfb7265d1e1b988cc75}
      DEPLOY_MODE: ${DEPLOY_MODE:-normal}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: zlai-client
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://8.136.144.140:3001/api
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres_data:
